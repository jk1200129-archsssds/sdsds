name: TikTok Downloader → ZIP → Filebin

# PKT 01:00 AM  =  UTC 20:00 (previous day)
on:
  schedule:
    - cron: "0 20 * * *"

  workflow_dispatch:   # Manual trigger for testing

permissions:
  contents: write      # History commit ke liye

jobs:
  download:
    name: Download & Upload
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 🎬 Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: 📦 Install packages
        run: pip install -q yt-dlp requests

      - name: 📂 Show history state
        run: |
          if [ -f download_history.txt ]; then
            echo "Already downloaded: $(wc -l < download_history.txt) videos"
            echo "Last 5 IDs:"
            tail -5 download_history.txt
          else
            echo "No history yet — fresh start"
          fi

      - name: 🚀 Run Downloader
        id: run
        run: |
          echo "PKT Time: $(TZ='Asia/Karachi' date '+%Y-%m-%d %H:%M PKT')"
          python main.py

      - name: 🔗 Show Download Link
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════════════"
          echo "  ✅  DOWNLOAD LINK NEECHE HAI"
          echo "════════════════════════════════════════════════"
          if [ -n "${{ steps.run.outputs.bin_url }}" ]; then
            echo ""
            echo "  📁 Bin Page     : ${{ steps.run.outputs.bin_url }}"
            echo "  📦 ZIP Download : ${{ steps.run.outputs.download_url }}"
            echo "  🎬 Total Videos : ${{ steps.run.outputs.total_downloaded }}"
            echo ""
            echo "  👆 ZIP Download link browser mein open karo"
            echo "     seedha download shuru ho jayega"
          else
            echo "  ⚠️  Script output nahi mila — upar logs check karo"
          fi
          echo "════════════════════════════════════════════════"
          echo ""
          echo "💡 TIP: Is page pe Summary tab bhi dekho — wahan bhi link hai"

      - name: 💾 Commit history file
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add download_history.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new history to commit"
          else
            git commit -m "history update $(TZ='Asia/Karachi' date '+%Y-%m-%d %H:%M PKT')"
            git push
          fi

      - name: 🗑️ Cleanup temp files
        if: always()
        run: rm -rf raw_videos/ final_videos/ zips/ 2>/dev/null || true
